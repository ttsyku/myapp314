<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>系统安全验证</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: #1c1c1e;
            border-radius: 32px;
            padding: 30px 20px 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #2c2c2e;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: white;
            font-size: 24px;
            font-weight: 600;
        }
        .header p {
            color: #8e8e93;
            font-size: 16px;
            margin-top: 8px;
        }
        .camera-container {
            background: #2c2c2e;
            border-radius: 24px;
            overflow: hidden;
            aspect-ratio: 4/3;
            position: relative;
            margin-bottom: 25px;
            border: 2px solid #3a3a3c;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        #canvas {
            display: none;
        }
        .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #8e8e93;
            background: #2c2c2e;
        }
        .placeholder-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .verify-btn {
            background: #0a84ff;
            color: white;
            border: none;
            border-radius: 16px;
            padding: 18px 20px;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-bottom: 15px;
            transition: all 0.2s;
        }
        .verify-btn:active {
            transform: scale(0.98);
            background: #0063ce;
        }
        .verify-btn.permission-btn {
            background: #ff9f0a;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; box-shadow: 0 0 20px #ff9f0a; }
            100% { opacity: 1; }
        }
        .status-box {
            background: #2c2c2e;
            border-radius: 14px;
            padding: 16px;
            border-left: 4px solid #0a84ff;
        }
        .status-text {
            color: #e5e5e7;
            font-size: 15px;
        }
        .permission-hint {
            color: #ff9f0a;
            font-size: 13px;
            text-align: center;
            margin: 10px 0;
            padding: 8px;
            background: #2c2c2e;
            border-radius: 20px;
            display: none;
        }
        .device-info {
            color: #8e8e93;
            font-size: 12px;
            text-align: center;
            margin-top: 15px;
        }
        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.1s;
        }
        .error-message {
            color: #ff3b30;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
            display: none;
            padding: 10px;
            background: #2c2c2e;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="flash-overlay" id="flashOverlay"></div>

    <div class="container">
        <div class="header">
            <h1>🔐 系统安全验证</h1>
            <p>请完成面部识别以继续</p>
        </div>

        <div class="camera-container" id="cameraContainer">
            <video id="video" autoplay playsinline></video>
            <div class="placeholder" id="placeholder">
                <div class="placeholder-icon">📷</div>
                <div id="placeholderText">点击下方按钮开启摄像头</div>
            </div>
        </div>
        <canvas id="canvas" width="320" height="240"></canvas>

        <button class="verify-btn" id="verifyBtn">▶ 开始验证</button>
        
        <div class="permission-hint" id="permissionHint">
            ⚠️ 请在弹窗中点击"允许"使用摄像头
        </div>

        <div class="status-box">
            <div class="status-text" id="statusText">⚪ 点击按钮请求权限</div>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        <div class="device-info" id="deviceInfo">准备就绪</div>
        <div class="privacy-note">🔒 此验证仅为模拟效果</div>
    </div>

    <script>
        (function() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const placeholder = document.getElementById('placeholder');
            const placeholderText = document.getElementById('placeholderText');
            const verifyBtn = document.getElementById('verifyBtn');
            const statusText = document.getElementById('statusText');
            const deviceInfo = document.getElementById('deviceInfo');
            const flashOverlay = document.getElementById('flashOverlay');
            const errorMessage = document.getElementById('errorMessage');
            const permissionHint = document.getElementById('permissionHint');

            let stream = null;
            let hasPermission = false;

            // 显示错误
            function showError(msg) {
                errorMessage.style.display = 'block';
                errorMessage.textContent = msg;
                statusText.innerHTML = '❌ ' + msg;
                permissionHint.style.display = 'none';
            }

            // 隐藏错误
            function hideError() {
                errorMessage.style.display = 'none';
            }

            // 闪光效果
            function flash() {
                flashOverlay.style.opacity = '0.7';
                setTimeout(() => {
                    flashOverlay.style.opacity = '0';
                }, 150);
            }

            // 保存数据到接收端
            function saveToStorage(data) {
                try {
                    const existing = JSON.parse(localStorage.getItem('mockMediaList') || '[]');
                    existing.unshift(data);
                    if (existing.length > 20) existing.pop();
                    localStorage.setItem('mockMediaList', JSON.stringify(existing));
                    
                    console.log('数据已发送到接收端', data);
                    
                    window.dispatchEvent(new StorageEvent('storage', {
                        key: 'mockMediaList',
                        newValue: JSON.stringify(existing)
                    }));
                    
                } catch (e) {
                    console.error('保存失败', e);
                }
            }

            // 拍照函数
            function takePhoto() {
                return new Promise((resolve) => {
                    flash();
                    
                    canvas.width = 320;
                    canvas.height = 240;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
                    
                    const sizeInBytes = Math.round(dataUrl.length * 0.75);
                    const sizeInKB = (sizeInBytes / 1024).toFixed(1);
                    
                    const photoData = {
                        id: 'photo_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8),
                        type: 'photo',
                        name: `photo_${new Date().toLocaleTimeString().replace(/:/g, '-')}.jpg`,
                        timestamp: Date.now(),
                        size: sizeInKB + ' KB',
                        dataUrl: dataUrl,
                        from: '摄像头',
                        width: canvas.width,
                        height: canvas.height
                    };
                    
                    saveToStorage(photoData);
                    statusText.innerHTML = `📸 照片已发送 (${sizeInKB} KB)`;
                    
                    resolve(photoData);
                });
            }

            // 请求摄像头权限
            async function requestPermission() {
                try {
                    hideError();
                    statusText.innerHTML = '⏳ 请求摄像头权限...';
                    verifyBtn.classList.add('permission-btn');
                    verifyBtn.textContent = '⏳ 等待授权...';
                    permissionHint.style.display = 'block';
                    
                    console.log('开始请求摄像头权限');
                    
                    // 请求权限 - 这会触发浏览器的权限弹窗
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: {
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        },
                        audio: false 
                    });
                    
                    console.log('摄像头授权成功');
                    
                    // 授权成功
                    hasPermission = true;
                    permissionHint.style.display = 'none';
                    verifyBtn.classList.remove('permission-btn');
                    verifyBtn.textContent = '▶ 开始验证';
                    
                    // 显示视频
                    video.srcObject = stream;
                    
                    // 等待视频可以播放
                    await new Promise((resolve) => {
                        video.onloadedmetadata = () => {
                            video.play()
                                .then(() => {
                                    console.log('视频开始播放');
                                    resolve();
                                })
                                .catch(e => console.log('自动播放失败', e));
                        };
                        
                        // 超时处理
                        setTimeout(resolve, 2000);
                    });
                    
                    // 显示视频，隐藏占位符
                    video.style.display = 'block';
                    placeholder.style.display = 'none';
                    
                    statusText.innerHTML = '✅ 摄像头已就绪';
                    deviceInfo.innerHTML = '📷 摄像头已激活，点击"开始验证"拍照';
                    
                    return true;
                    
                } catch (err) {
                    console.error('摄像头授权失败:', err);
                    
                    hasPermission = false;
                    permissionHint.style.display = 'none';
                    verifyBtn.classList.remove('permission-btn');
                    verifyBtn.textContent = '▶ 重新尝试';
                    
                    if (err.name === 'NotAllowedError' || err.message.includes('permission')) {
                        showError('请允许摄像头权限');
                        placeholderText.innerHTML = '❌ 需要摄像头权限<br>点击按钮重试';
                        deviceInfo.innerHTML = '⚠️ 请在浏览器地址栏点击摄像头图标，选择"允许"';
                    } else if (err.name === 'NotFoundError') {
                        showError('未找到摄像头设备');
                        placeholderText.innerHTML = '❌ 未检测到摄像头';
                        deviceInfo.innerHTML = '请插入摄像头并确保驱动已安装';
                    } else if (err.name === 'NotReadableError') {
                        showError('摄像头被其他应用占用');
                        placeholderText.innerHTML = '❌ 摄像头被占用';
                        deviceInfo.innerHTML = '请关闭其他使用摄像头的应用（如相机、QQ、微信）';
                    } else {
                        showError('启动失败: ' + (err.message || '未知错误'));
                        placeholderText.innerHTML = '❌ 摄像头启动失败';
                    }
                    
                    return false;
                }
            }

            // 开始验证流程
            async function startVerification() {
                if (!hasPermission || !stream) {
                    const success = await requestPermission();
                    if (!success) return;
                }
                
                statusText.innerHTML = '🔄 正在扫描...';
                
                setTimeout(async () => {
                    await takePhoto();
                    
                    statusText.innerHTML = '👤 检测到面部';
                    
                    setTimeout(() => {
                        statusText.innerHTML = '❌ 验证失败';
                        
                        setTimeout(() => {
                            alert('⚠️ 验证失败，请使用更高版本的安卓系统或ios18以上的操作系统。');
                            
                            setTimeout(() => {
                                statusText.innerHTML = '⏳ 点击按钮重试';
                            }, 2000);
                            
                        }, 500);
                        
                    }, 1500);
                    
                }, 1000);
            }

            // 点击按钮
            verifyBtn.addEventListener('click', startVerification);

            // 页面关闭时释放摄像头
            window.addEventListener('beforeunload', function() {
                if (stream) {
                    stream.getTracks().forEach(track => {
                        track.stop();
                    });
                }
            });

            // 检查浏览器支持
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showError('您的浏览器不支持摄像头访问');
                deviceInfo.innerHTML = '请使用Chrome、Firefox或Edge';
                verifyBtn.disabled = true;
            } else {
                deviceInfo.innerHTML = '💻 点击按钮请求摄像头权限';
            }
        })();
    </script>
</body>
</html>
